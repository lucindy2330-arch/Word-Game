<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服装单词挑战 - 翻牌游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective {
            perspective: 1000px;
        }
        .flip-card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .flip-card-inner.is-flipped {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            backface-visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotateY(180deg); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-5px, 0) rotateY(180deg); }
            20%, 40%, 60%, 80% { transform: translate(5px, 0) rotateY(180deg); }
        }
        .shake-animation {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        .star-glow {
            box-shadow: 0 0 20px 5px rgba(255, 215, 0, 0.7);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-5xl mx-auto">
        <!-- 头部信息 -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">👕 衣物单词翻牌挑战</h1>
            <p class="text-slate-600 italic">找到星星加1分 ⭐ (共3张)，遇到炸弹扣1分 💣 (共2张)</p>
            <div class="flex justify-center gap-4">
                <button onclick="initGame()" class="mt-4 px-6 py-2 bg-indigo-600 text-white rounded-full font-bold hover:bg-indigo-700 transition shadow-lg flex items-center gap-2">
                    <span>🔄</span> 重新洗牌开始
                </button>
            </div>
        </div>

        <!-- 卡片容器 -->
        <div id="card-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6">
            <!-- 卡片由JS动态生成 -->
        </div>
    </div>

    <!-- 弹窗提示 -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-xl text-white font-bold text-xl opacity-0 transition-opacity pointer-events-none shadow-2xl z-50">
    </div>

    <script>
        // 音效定义 (使用了CDN公开音频流)
        const sounds = {
            flip: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            star: new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3'),
            bomb: new Audio('https://assets.mixkit.co/active_storage/sfx/167/167-preview.mp3'),
            shuffle: new Audio('https://assets.mixkit.co/active_storage/sfx/2367/2367-preview.mp3')
        };

        const words = [
            "jacket", "coat", "suit", "swimsuit", "jumper", 
            "sweater", "trousers", "shorts", "jeans", "dress", 
            "skirt", "uniform"
        ];

        let gameCards = [];

        function playSound(type) {
            if (sounds[type]) {
                sounds[type].currentTime = 0;
                sounds[type].play().catch(e => console.log("音频播放需要用户点击页面后触发"));
            }
        }

        function initGame() {
            playSound('shuffle');
            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';
            
            let shuffledWords = [...words].sort(() => Math.random() - 0.5);
            gameCards = shuffledWords.map(word => ({ word, type: 'normal' }));
            
            // 获取所有索引并打乱
            let indices = Array.from({length: gameCards.length}, (_, i) => i);
            indices.sort(() => Math.random() - 0.5);
            
            // 设置3个星星
            gameCards[indices[0]].type = 'star';
            gameCards[indices[1]].type = 'star';
            gameCards[indices[2]].type = 'star';
            
            // 设置2个炸弹
            gameCards[indices[3]].type = 'bomb';
            gameCards[indices[4]].type = 'bomb';

            gameCards.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'perspective h-48 md:h-56';
                
                let backContent = `<span class="text-2xl font-bold text-slate-800">${card.word}</span>`;
                let backClass = 'bg-white';
                
                if (card.type === 'star') {
                    backContent = `<div class="flex flex-col items-center">
                        <span class="text-4xl mb-2 animate-bounce">⭐</span>
                        <span class="text-xl font-bold text-yellow-600">${card.word}</span>
                        <span class="text-xs mt-1 text-yellow-500 font-black">+1 POINT!</span>
                    </div>`;
                    backClass = 'bg-yellow-50 border-4 border-yellow-400 star-glow';
                } else if (card.type === 'bomb') {
                    backContent = `<div class="flex flex-col items-center">
                        <span class="text-4xl mb-2">💣</span>
                        <span class="text-xl font-bold text-red-600">${card.word}</span>
                        <span class="text-xs mt-1 text-red-500 font-black">-1 POINT!</span>
                    </div>`;
                    backClass = 'bg-red-50 border-4 border-red-400';
                }

                cardEl.innerHTML = `
                    <div class="flip-card-inner w-full h-full relative" onclick="flipCard(this, '${card.type}')">
                        <div class="flip-card-front rounded-2xl bg-indigo-500 flex items-center justify-center shadow-md border-4 border-white overflow-hidden">
                            <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle,white_10%,transparent_10%)] [background-size:20px_20px]"></div>
                            <span class="text-white text-5xl font-black relative z-10">?</span>
                        </div>
                        <div class="flip-card-back rounded-2xl ${backClass} flex items-center justify-center shadow-xl border-2 border-slate-200">
                            ${backContent}
                        </div>
                    </div>
                `;
                grid.appendChild(cardEl);
            });
        }

        function flipCard(el, type) {
            if (el.classList.contains('is-flipped')) return;
            
            playSound('flip');
            el.classList.add('is-flipped');
            
            setTimeout(() => {
                if (type === 'star') {
                    playSound('star');
                    showToast("⭐ 发现幸运星！加 1 分！", "bg-yellow-500");
                } else if (type === 'bomb') {
                    playSound('bomb');
                    el.classList.add('shake-animation');
                    showToast("💣 糟糕！读错扣 1 分！", "bg-red-600");
                }
            }, 300);
        }

        function showToast(msg, colorClass) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-xl text-white font-bold text-xl transition-opacity pointer-events-none shadow-2xl opacity-100 ${colorClass}`;
            
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }

        window.onload = initGame;
    </script>
</body>
</html>
